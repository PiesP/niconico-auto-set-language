name: "🔒 Security Scanning"

# Responsibility: Security analysis for Node.js + pnpm project
# - PR/merge queue gate: OSV diff scan
# - Scheduled/manual depth: OSV full scan
#
# Trigger: PR to master + merge queue + weekly schedule + manual

on:
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "0 1 * * 0" # Weekly on Sundays at 1 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan-pr:
    name: "🛡️ OSV Vulnerability Scan (PR Diff)"
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        ./
      fail-on-vuln: true

  osv-scan-full:
    name: "🛡️ OSV Vulnerability Scan (Full)"
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --lockfile=pnpm-lock.yaml
        ./
      fail-on-vuln: false
