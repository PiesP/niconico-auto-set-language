name: "🏗️ CI"

# Responsibility: Required verification for pull requests and merge queue
# - Install dependencies with pnpm
# - Run the repository quality gate and build outputs
# - Validate UserScript metadata before merge
#
# Triggered on: Push/PR to master + merge queue

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: "✅ Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🔎 Verify pnpm available
        run: pnpm -v

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate and build
        run: pnpm verify

      - name: 🧪 Verify UserScript metadata
        shell: bash
        run: |
          set -euo pipefail
          FILE="dist/niconico-auto-set-language.user.js"
          PKG_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"

          # --- Structure: start + end tags ---
          if ! head -n 1 "$FILE" | grep -qF "// ==UserScript=="; then
            echo "::error::Missing // ==UserScript== opening tag"
            exit 1
          fi
          if ! grep -qFx "// ==/UserScript==" "$FILE"; then
            echo "::error::Missing // ==/UserScript== closing tag (must be on its own line, exact match)"
            exit 1
          fi

          # --- Required metadata fields ---
          required_fields=("@name" "@namespace" "@version" "@description" "@license" "@match" "@grant")
          for field in "${required_fields[@]}"; do
            if ! grep -qE "^// ${field}\s" "$FILE"; then
              echo "::error::Required UserScript field ${field} is missing"
              exit 1
            fi
          done

          # --- @version must match package.json ---
          if ! grep -qE "^// @version\s+${PKG_VERSION}$" "$FILE"; then
            echo "::error::@version does not match package.json version (expected '${PKG_VERSION}')"
            grep -n "^// @version" "$FILE" || true
            exit 1
          fi

          # --- Sanity: not minified ---
          lines="$(wc -l < "$FILE")"
          if [ "$lines" -lt 50 ]; then
            echo "::error::Build output looks minified (${lines} lines; expected >= 50)"
            exit 1
          fi

          # --- Minified output must exist ---
          if [ ! -f "dist/niconico-auto-set-language.user.min.js" ]; then
            echo "::error::Minified build output (dist/niconico-auto-set-language.user.min.js) is missing"
            exit 1
          fi

          echo "✅ UserScript metadata validated (version=${PKG_VERSION}, lines=${lines})"

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
