name: 🏗️ CI

# Responsibility: fast, independent verification for pull requests and merge queue
# - Run static quality checks
# - Build the production userscript
# - Validate UserScript metadata
# - Check source duplication
#
# Expensive mutation testing is not configured for this userscript-only project.
#
# Triggered on: Push/PR to master + merge queue

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "26"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ✅ Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate
        run: pnpm quality

      - name: 🧪 Run runtime tests
        run: pnpm test

  build:
    name: 🏗️ Build userscript
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build userscript
        run: pnpm build:all:ci

      - name: ✅ Verify user-facing feature contracts
        run: pnpm verify:features

      - name: 🧪 Verify UserScript metadata
        shell: bash
        run: |
          set -euo pipefail
          FILE="dist/niconico-auto-set-language.user.js"
          PKG_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"

          if ! head -n 1 "$FILE" | grep -qF "// ==UserScript=="; then
            echo "::error::Missing // ==UserScript== opening tag"
            exit 1
          fi
          if ! grep -qFx "// ==/UserScript==" "$FILE"; then
            echo "::error::Missing // ==/UserScript== closing tag"
            exit 1
          fi

          required_fields=("@name" "@namespace" "@version" "@description" "@license" "@match" "@grant")
          for field in "${required_fields[@]}"; do
            if ! grep -qE "^// ${field}\s" "$FILE"; then
              echo "::error::Required UserScript field ${field} is missing"
              exit 1
            fi
          done

          if ! grep -qE "^// @version\s+${PKG_VERSION}$" "$FILE"; then
            echo "::error::@version does not match package.json version (expected '${PKG_VERSION}')"
            grep -n "^// @version" "$FILE" || true
            exit 1
          fi

          lines="$(wc -l < "$FILE")"
          if [ "$lines" -lt 50 ]; then
            echo "::error::Build output looks minified (${lines} lines; expected >= 50)"
            exit 1
          fi

          if [ ! -f "dist/niconico-auto-set-language.user.min.js" ]; then
            echo "::error::Minified build output is missing"
            exit 1
          fi

          echo "✅ UserScript metadata validated (version=${PKG_VERSION}, lines=${lines})"

      - name: 📊 Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  duplication:
    name: 🔍 Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔧 Install nose
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/install-nose.sh

      - name: 🔎 Check for new duplication
        run: nose query . --baseline .nose-baseline.json --fail-on new
