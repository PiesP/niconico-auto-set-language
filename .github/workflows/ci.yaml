name: "🏗️ CI"

# Responsibility: Required verification for pull requests and merge queue
# - Install dependencies with the pinned pnpm 10 launcher
# - Run the repository quality gate and build outputs
# - Validate UserScript metadata before merge
#
# Triggered on: Push/PR to master + merge queue

'on':
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

env:
  NODE_VERSION: "24"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: "✅ Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🛡️ Guard unsupported pnpm/action-setup majors
        run: |
          set -euo pipefail
          if grep -REn 'uses:[[:space:]]*pnpm/action-setup@v([5-9]|[1-9][0-9]+)' .github/workflows; then
            echo "pnpm/action-setup major >=5 is blocked until the pnpm 10 install regression is fixed upstream." >&2
            exit 1
          fi

      # pnpm/action-setup@v6 can route pnpm 10 projects through a pnpm 11
      # launcher on GitHub Actions, which breaks install with
      # ERR_PNPM_BROKEN_LOCKFILE. Keep v4 until that upstream regression is fixed.
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.25.0"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🔎 Verify pnpm available
        run: pnpm -v

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Run quality gate and build
        run: pnpm run verify

      - name: 🧪 Verify UserScript metadata
        run: |
          set -euo pipefail
          if ! head -n 1 dist/niconico-auto-set-language.user.js | grep -q "// ==UserScript=="; then
            echo "Error: UserScript metadata is missing from the build output"
            exit 1
          fi
          if ! grep -q "^// @version" dist/niconico-auto-set-language.user.js; then
            echo "Error: UserScript @version is missing from the build output"
            exit 1
          fi

          lines=$(wc -l < dist/niconico-auto-set-language.user.js)
          if [ "$lines" -lt 50 ]; then
            echo "Error: Build output looks minified (too few lines: $lines)"
            exit 1
          fi

          if [ ! -f dist/niconico-auto-set-language.user.min.js ]; then
            echo "Error: Minified build output is missing"
            exit 1
          fi

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
