name: "🚀 Release"

# Responsibility: Publish tagged userscript releases
# - Build release assets from the tagged commit
# - Sync userscript metadata to the release version and CDN URLs
# - Publish files to the release branch and GitHub Releases
#
# Trigger: Tag push (v*)

# Security: All third-party actions pinned to full commit SHAs.

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "26"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: "🚀 Publish Release"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 🔎 Verify pnpm available
        run: pnpm -v

      - name: 📝 Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Error: derived version is empty" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build userscript
        run: pnpm build

      - name: 🔧 Sync userscript metadata (@version, @downloadURL, @updateURL)
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/update-userscript-meta.ts \
            dist/niconico-auto-set-language.user.js "$RELEASE_VERSION"

      - name: 🗜️ Build minified userscript
        run: pnpm build:min

      - name: 🧪 Verify UserScript metadata
        run: |
          set -euo pipefail
          if ! head -n 1 dist/niconico-auto-set-language.user.js | grep -q "// ==UserScript=="; then
            echo "Error: UserScript metadata is missing from the build output"
            exit 1
          fi
          if ! grep -q "^// @version[[:space:]]\+${RELEASE_VERSION}$" dist/niconico-auto-set-language.user.js; then
            echo "Error: @version does not match tag-derived version (${RELEASE_VERSION})"
            grep -n "^// @version" dist/niconico-auto-set-language.user.js || true
            exit 1
          fi
          if ! grep -q "^// @downloadURL" dist/niconico-auto-set-language.user.js; then
            echo "Error: @downloadURL missing"
            exit 1
          fi
          if ! grep -q "^// @updateURL" dist/niconico-auto-set-language.user.js; then
            echo "Error: @updateURL missing"
            exit 1
          fi
          if [ ! -f dist/niconico-auto-set-language.user.min.js ]; then
            echo "Error: Minified build output is missing"
            exit 1
          fi

      - name: 📤 Publish to release branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./dist
          force_orphan: true

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/niconico-auto-set-language.user.js
            dist/niconico-auto-set-language.user.min.js
            dist/niconico-auto-set-language.user.min.js.map
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-v${{ steps.version.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
