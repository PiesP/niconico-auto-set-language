minimumReleaseAge: 10080

# Security-critical packages that should bypass the minimum release age.
# These packages receive immediate updates even within the 7-day cooling period:
#   - esbuild/core-js/minimatch: build toolchain, known supply-chain targets
minimumReleaseAgeExclude:
  - esbuild
  - core-js
  - minimatch

allowBuilds:
  - esbuild
  - core-js

strictDepBuilds: true

blockExoticSubdeps: true
engineStrict: true
lockfileVersion: 3
autoInstallPeers: true
strictPeerDependencies: false
preferOffline: true
