# Dependabot cooldown (7 days) handles supply-chain cooling;
# minimumReleaseAge removed to avoid pnpm --no-save conflicts with Dependabot.

# Security-critical packages that bypass the 7-day cooling period:
#   - minimatch: known supply-chain attack target (CVE-2022-3517)
minimumReleaseAgeExclude:
  - minimatch

allowBuilds:
  - esbuild
  - core-js

strictDepBuilds: true

blockExoticSubdeps: true

# Fail if the current Node.js / pnpm version doesn't match engines field.
engineStrict: true

autoInstallPeers: true
strictPeerDependencies: false
preferOffline: true
